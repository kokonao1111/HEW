<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test</title>
  <link rel="stylesheet" href="red-tracker.css">
</head>
<body>
  <div id="app">
    <div id="camera-container">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
      <div id="status-badge" class="badge undetected">未検出</div>
    </div>

    <div id="controls">
      <div class="control-row">
        <button id="btn-start">カメラ開始</button>
        <button id="btn-reset-trail">軌跡リセット</button>
      </div>

      <div class="slider-group">
        <label>
          青しきい値
          <span id="threshold-val">35</span>
          <input type="range" id="slider-threshold" min="5" max="80" value="35">
        </label>
        <label>
          最小検出面積
          <span id="area-val">200</span> px²
          <input type="range" id="slider-area" min="50" max="5000" step="50" value="200">
        </label>
      </div>

      <div id="info-panel">
        <div class="info-item">
          <span class="info-label">座標</span>
          <span id="info-pos">---</span>
        </div>
        <div class="info-item">
          <span class="info-label">速度</span>
          <span id="info-vel">---</span>
        </div>
        <div class="info-item">
          <span class="info-label">面積</span>
          <span id="info-area">---</span>
        </div>
      </div>
    </div>

  </div>

  <script src="red-tracker.js"></script>
</body>
</html>
